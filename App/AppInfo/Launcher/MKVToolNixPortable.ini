[Launch]
ProgramExecutable=MKVToolNix32\mkvtoolnix-gui.exe
ProgramExecutable64=MKVToolNix\mkvtoolnix-gui.exe
WorkingDirectory=%FullAppDir%
DirectoryMoveOK=yes
SupportsUNC=yes

[DirectoriesMove]
cache=%FullAppDir%\cache

[FilesMove]
mkvtoolnix-gui.ini=%FullAppDir%

[FileWrite1]
Type=Replace
File=%PAL:DataDir%\mkvtoolnix-gui.ini
Find=%PAL:LastDrive%%PAL:LastPackagePartialDir%\
Replace=%PAL:Drive%%PAL:PackagePartialDir%\

[FileWrite2]
Type=Replace
File=%PAL:DataDir%\mkvtoolnix-gui.ini
Find=%PAL:LastPortableAppsBaseDir%\
Replace=%PAL:PortableAppsBaseDir%\

[FileWrite3]
Type=Replace
File=%PAL:DataDir%\mkvtoolnix-gui.ini
Find=%PAL:LastDrive%\
Replace=%PAL:Drive%\

[FileWrite4]
Type=Replace
File=File=%PAL:DataDir%\mkvtoolnix-gui.ini
Find=%PAL:LastDrive%%PAL:LastPackagePartialDir:DoubleBackslash%\\
Replace=%PAL:Drive%%PAL:PackagePartialDir:DoubleBackslash%\\

[FileWrite5]
Type=Replace
File=File=%PAL:DataDir%\mkvtoolnix-gui.ini
Find=%PAL:LastPortableAppsBaseDir:DoubleBackslash%\\
Replace=%PAL:PortableAppsBaseDir:DoubleBackslash%\\

[FileWrite6]
Type=Replace
File=File=%PAL:DataDir%\mkvtoolnix-gui.ini
Find=%PAL:LastDrive%\\
Replace=%PAL:Drive%\\
